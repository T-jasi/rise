<html>
    <head></head>
    <body>
        <input type="text" id="search-term"><br/>
        <div id="display-names"></div>
        <script>
            const searchTermElement=document.querySelector("#search-term");
            const displayNamesElement=document.querySelector("#display-names");
            const all_users=["chetan","tejasi","abhinav","tanishka","shivam","debyasini","tarun"];

            /*
            When the input is empty, display all users (by inserting multiple H1s)
            When the input is not empty, display users which contain that specific term in input
            e.g.
            if input.value is "tan" then users displayed should be "chetan" and "tanishka" (i.e. two H1 elements inside the div)

            DO NOT MODIFY ANYTHING ABOVE THIS LINE INCLUDING THE HTML.
            */
            
           function display(i){
                const h1element=document.createElement("h1");
                h1element.innerText=all_users[i];
                displayNamesElement.appendChild(h1element);
                
           }
            
           function output(){
            displayNamesElement.innerHTML="";
            if(searchTermElement.value === " "){
                for(let j=0; j< all_users.length; j++){
                    display(j);
                }
            }
            else{
                for(let j=0; j<all_users.length; j++){
                    if (all_users[j].includes(searchTermElement.value)){
                        display(j);
                    }
                }
            }
           }
          
           searchTermElement.addEventListener("input",output);
           
          


        </script>
    </body>
</html>
