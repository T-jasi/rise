<html>
    <head>
        <title>Counter</title>
    </head>
    <body>
        <button> click to increase </button>
        <h1> 0 </h1>

    </body>
    <script>
        let state=0

        function update(){
            state ++;
            const h1element=document.querySelector('h1');
            h1element.innerText=state;        
        }
        const button=document.querySelector('button');
        button.addEventListener('click',update)
    </script>

</html>
